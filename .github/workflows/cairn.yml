# Generated by Cairn from cairn.yaml (ci.provider: github). Re-run `cairn init` to update.
name: cairn
on: [push, pull_request]
jobs:
  cairn:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - run: go install github.com/IVIR3zaM/Cairn/cmd/cairn@latest
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: pip install ruff black flake8 pytest
      - run: cairn verify
