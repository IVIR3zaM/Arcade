# One container = one Pi. It runs Ollama + whisper + Piper + the brain API, all
# sharing a single budget, mirroring the cabinet's Raspberry Pi 5 (8GB). On the
# real Pi these all contend for one board's resources; capping this one container
# the same way is the faithful analog (two separately-capped containers could
# exceed a Pi's shared pool).
#
# APPROXIMATING PI SPEED: a Pi 5 has 4 cores at ~2.4GHz (Cortex-A76). An Apple-
# Silicon core is ~2.5-3x that per-core, so 4 Mac cores would run ~3x too fast.
# We keep FOUR worker threads everywhere (COMPANION_NUM_THREAD=4 → Pi-like
# parallelism), but cap the container's aggregate compute with a fractional CPU
# quota (PI_CPUS, default 1.5 ≈ 4 Pi cores' worth). Net: four threads sharing a
# throttled quota behave like four slow cores. Raise PI_CPUS toward 4 to unshackle
# it, or lower it if your Mac is faster. (Memory bandwidth still can't be throttled
# — a Pi's is far lower — so even at PI_CPUS=1.5 this is a mild upper bound.)
#
# NOTE: give Docker Desktop at least 8GB (Settings → Resources) or the 8g limit
# will squeeze the host. First run downloads the models (LLM ~2GB + whisper +
# voices) into the pi_models volume; later runs reuse them.
services:
  pi-box:
    build:
      context: .
      dockerfile: brain/Dockerfile
    environment:
      OLLAMA_URL: http://localhost:11434  # Ollama runs inside this same container
      # 3b is the target: the turn is split into small atomic calls (intent, then
      # phrasing) it can handle fast on Pi-class CPU. Try qwen2.5:7b for nicer
      # wording at higher latency.
      COMPANION_MODEL: qwen2.5:3b
      COMPANION_NUM_THREAD: "${COMPANION_NUM_THREAD:-4}"  # worker threads (LLM + whisper) — mirror the Pi's 4 cores
      COMPANION_NUM_CTX: "${COMPANION_NUM_CTX:-2048}"     # small KV cache → cheaper per-token CPU
      OLLAMA_KEEP_ALIVE: "-1"  # keep the model resident so turns don't reload it
      OLLAMA_MODELS: /models/ollama        # keep the LLM in the cached volume
      HF_HOME: /models/hf                  # keep the whisper model in the volume
      VOICES_DIR: /models/voices           # keep the Piper voices in the volume
      ARCADE_DB: /data/arcade.db           # persistent profiles, memory, schedules
      ENGAGE_TIMEOUT_S: "${ENGAGE_TIMEOUT_S:-45}"  # silence before Arc needs "Hey Arc" again
      MONITOR_IDLE_S: "${MONITOR_IDLE_S:-120}"     # inactivity (no game) before the monitor powers off
    volumes:
      - pi_models:/models  # caches the LLM, whisper model, and voices across runs
      - pi_data:/data      # the arcade's memory — survives restarts
    cpus: "${PI_CPUS:-1.5}"  # aggregate compute cap ≈ a Pi 5's 4 cores (see header)
    mem_limit: 8g
    ports:
      - "8080:8000"  # the host mic/speaker CLI talks to localhost:8080

volumes:
  pi_models:
  pi_data:
